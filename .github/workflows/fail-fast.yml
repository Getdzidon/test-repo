on:
  push:
    branches: 
      - main
  workflow_dispatch:

env:
  CONTAINER_REGISTRY: docker.io
  IMAGE_NAME: test-app
  DOCKER_USERNAME: getdzidon

jobs:
  docker:
    strategy: 
      fail-fast: false # when a job fails, it will not affect successive jobs running in parallel. 
      max-parallel: 1 # this means only three jobs will run parallelly. Once done, another three set will run in parallel.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Build
        run: docker build -t ${{ env.CONTAINER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest .
      
      - name: Docker Login
        run: docker login --username=${{ env.DOCKER_USERNAME }} --password-stdin <<< "${{ secrets.DOCKER_HUB_TOKEN }}"
      
      - name: Docker Publish
        run: docker push ${{ env.CONTAINER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAM }}:latest
  
  deploy:
    needs: docker
    concurrency:
      group: production-deployment
      cancel-in-progress: true
    runs-on: ubuntu-latest
    
    steps:
      - name: Docker Login
        run: docker login --username=${{ env.DOCKER_USERNAME }} --password-stdin <<< "${{ secrets.DOCKER_HUB_TOKEN }}"
      
      - name: Docker Run
        run: |
          docker run -d -p 8080:80 ${{ env.CONTAINER_REGISTRY }}/${{ env.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          sleep 300s 